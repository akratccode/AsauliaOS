<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.field { display: flex; flex-direction: column; gap: 6px; }
.lb { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
.input { background: var(--bg-2); color: var(--fg-1); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: var(--font-sans); outline: none; transition: border-color 120ms; }
.input::placeholder { color: var(--fg-4); }
.input:focus { border-color: var(--asaulia-blue); box-shadow: 0 0 0 3px rgba(58,91,255,0.22); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.search { display: flex; align-items: center; gap: 8px; background: var(--bg-2); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; color: var(--fg-3); }
.search input { background: transparent; border: none; outline: none; color: var(--fg-1); font-size: 14px; flex: 1; font-family: var(--font-sans); }
.kbd { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding: 2px 6px; background: var(--bg-3); border-radius: 4px; box-shadow: var(--stroke-inner); }
</style></head>
<body><div class="card">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input placeholder="Find a brand, deliverable, invoice…">
    <span class="kbd">⌘K</span>
  </div>
  <div class="grid">
    <div class="field"><span class="lb">Brand name</span><input class="input" value="Lumen Coffee Co."></div>
    <div class="field"><span class="lb">Timezone</span><input class="input" value="America/Mexico_City"></div>
    <div class="field"><span class="lb">Website</span><input class="input" placeholder="https://…"></div>
    <div class="field"><span class="lb">Slug</span><input class="input" value="lumen-coffee"></div>
  </div>
</div></body></html>
