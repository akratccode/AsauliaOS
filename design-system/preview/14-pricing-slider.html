<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.wrap { padding: 16px 20px 24px; background: var(--bg-2); border-radius: 14px; box-shadow: var(--stroke-inner); }
.lb { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
.hero { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
.fx { font-size: 44px; font-weight: 500; letter-spacing: -0.02em; color: #7F95FF; font-variant-numeric: tabular-nums; }
.vr { font-size: 22px; color: #35D39A; font-weight: 500; font-variant-numeric: tabular-nums; margin-left: 6px; }
.plus { color: var(--fg-3); font-weight: 300; margin: 0 6px; }
.slash { color: var(--fg-3); font-size: 14px; margin-left: 10px; }
.track-wrap { position: relative; height: 36px; display: flex; align-items: center; }
.track { width: 100%; height: 6px; border-radius: 9999px; background: linear-gradient(90deg, rgba(127,149,255,0.2) 0%, rgba(53,211,154,0.2) 100%); position: relative; }
.track-fill { position: absolute; inset: 0 60% 0 0; background: linear-gradient(90deg, #7F95FF, #3A5BFF); border-radius: 9999px; }
.handle { position: absolute; left: 40%; top: 50%; transform: translate(-50%,-50%); width: 24px; height: 24px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 6px rgba(58,91,255,0.22), 0 2px 8px rgba(0,0,0,0.5); }
.anchors { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body><div class="card">
  <div class="wrap">
    <div class="lb">Your plan</div>
    <div class="hero">
      <div><span class="fx">$299</span><span class="plus">+</span><span class="vr">14.2%</span><span class="slash">/ month</span></div>
    </div>
    <div class="track-wrap"><div class="track"><div class="track-fill"></div><div class="handle"></div></div></div>
    <div class="anchors"><span>$99 · 20%  Starter</span><span>Pro  $1,000 · 7%</span></div>
  </div>
</div></body></html>
