<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.sw { border-radius: 12px; padding: 14px; min-height: 84px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--stroke-inner); color: #fff; }
.sw .nm { font-size: 12px; font-weight: 500; letter-spacing: -0.01em; }
.sw .hx { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw" style="background:#3A5BFF"><span class="nm">blue</span><span class="hx">#3A5BFF</span></div>
    <div class="sw" style="background:#1F35C7"><span class="nm">blue-ink</span><span class="hx">#1F35C7</span></div>
    <div class="sw" style="background:#5B7BFF"><span class="nm">blue-glow</span><span class="hx">#5B7BFF</span></div>
    <div class="sw" style="background:#7F95FF;color:#0B1020"><span class="nm">blue-soft</span><span class="hx">#7F95FF</span></div>
    <div class="sw" style="background:#0B1020"><span class="nm">ink</span><span class="hx">#0B1020</span></div>
  </div>
</div></body></html>
