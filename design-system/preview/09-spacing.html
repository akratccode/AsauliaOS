<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.row-s { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
.bar { background: var(--asaulia-blue); height: 12px; border-radius: 2px; }
.lbl { width: 54px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.val { width: 40px; font-size: 12px; color: var(--fg-2); text-align: right; font-variant-numeric: tabular-nums; }
</style></head>
<body><div class="card">
  <div><div class="row-s"><span class="lbl">space-1</span><span class="bar" style="width:4px"></span><span class="val">4</span></div>
  <div class="row-s"><span class="lbl">space-2</span><span class="bar" style="width:8px"></span><span class="val">8</span></div>
  <div class="row-s"><span class="lbl">space-3</span><span class="bar" style="width:12px"></span><span class="val">12</span></div>
  <div class="row-s"><span class="lbl">space-4</span><span class="bar" style="width:16px"></span><span class="val">16</span></div>
  <div class="row-s"><span class="lbl">space-5</span><span class="bar" style="width:20px"></span><span class="val">20</span></div>
  <div class="row-s"><span class="lbl">space-6</span><span class="bar" style="width:24px"></span><span class="val">24</span></div>
  <div class="row-s"><span class="lbl">space-8</span><span class="bar" style="width:32px"></span><span class="val">32</span></div>
  <div class="row-s"><span class="lbl">space-10</span><span class="bar" style="width:40px"></span><span class="val">40</span></div>
  <div class="row-s"><span class="lbl">space-12</span><span class="bar" style="width:48px"></span><span class="val">48</span></div>
  <div class="row-s"><span class="lbl">space-16</span><span class="bar" style="width:64px"></span><span class="val">64</span></div></div>
</div></body></html>
