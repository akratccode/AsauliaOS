<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.radii { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; align-items: end; }
.box { background: var(--bg-2); box-shadow: var(--stroke-inner); padding: 12px; display: flex; flex-direction: column; align-items:center; gap: 6px; }
.sample { width: 64px; height: 64px; background: linear-gradient(180deg, #3A5BFF, #1F35C7); }
.nm { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); }
.val { font-size: 12px; color: var(--fg-2); font-weight: 500; }
</style></head>
<body><div class="card">
  <div class="radii">
    <div class="box"><div class="sample" style="border-radius:6px"></div><span class="val">xs</span><span class="nm">6</span></div>
    <div class="box"><div class="sample" style="border-radius:10px"></div><span class="val">sm</span><span class="nm">10</span></div>
    <div class="box"><div class="sample" style="border-radius:14px"></div><span class="val">md</span><span class="nm">14</span></div>
    <div class="box"><div class="sample" style="border-radius:20px"></div><span class="val">lg</span><span class="nm">20</span></div>
    <div class="box"><div class="sample" style="border-radius:28px"></div><span class="val">xl</span><span class="nm">28</span></div>
    <div class="box"><div class="sample" style="border-radius:36px"></div><span class="val">2xl</span><span class="nm">36</span></div>
  </div>
</div></body></html>
