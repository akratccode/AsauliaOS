<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.m { background: var(--bg-2); border-radius: 14px; padding: 18px; box-shadow: var(--stroke-inner); display: flex; flex-direction: column; gap: 8px; }
.lb { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
.big { font-size: 36px; font-weight: 500; letter-spacing: -0.02em; color: var(--fg-1); font-variant-numeric: tabular-nums; line-height: 1; }
.spark { margin-top: 4px; }
.foot { display: flex; justify-content: space-between; font-size: 12px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
.up { color: #35D39A; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="m">
      <span class="lb">Attributed · period to date</span>
      <span class="big">$4,230</span>
      <svg class="spark" viewBox="0 0 200 32" width="100%" height="32" preserveAspectRatio="none"><path d="M0 26 L20 22 L40 24 L60 18 L80 20 L100 12 L120 14 L140 8 L160 10 L180 6 L200 4" stroke="#35D39A" stroke-width="1.5" fill="none"/></svg>
      <div class="foot"><span>12 of 30 days</span><span class="up">▲ 14%</span></div>
    </div>
    <div class="m">
      <span class="lb">Deliverables</span>
      <span class="big">8<span style="color:var(--fg-3); font-size:20px"> / 12</span></span>
      <div style="display:flex; gap:2px; height: 6px; margin-top: 6px; border-radius: 3px; overflow:hidden;">
        <div style="flex:5; background:#35D39A"></div>
        <div style="flex:3; background:#7F95FF"></div>
        <div style="flex:2; background:#F5B544"></div>
        <div style="flex:2; background:rgba(255,255,255,0.04)"></div>
      </div>
      <div class="foot"><span>5 done · 3 in progress · 2 in review</span><span>67%</span></div>
    </div>
  </div>
</div></body></html>
