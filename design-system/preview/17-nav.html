<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.nav { background: var(--bg-1); border-radius: 14px; padding: 10px; display: flex; flex-direction: column; gap: 4px; width: 240px; box-shadow: var(--stroke-inner); }
.item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: var(--fg-2); font-size: 14px; font-weight: 500; cursor: pointer; }
.item:hover { background: rgba(255,255,255,0.03); color: var(--fg-1); }
.item.active { background: var(--bg-4); color: var(--fg-1); box-shadow: var(--stroke-inner); }
.item.active svg { color: var(--asaulia-blue); }
.item svg { width: 18px; height: 18px; color: var(--fg-3); }
.brand { display: flex; align-items: center; gap: 10px; padding: 10px 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 4px; }
.brand img { height: 22px; }
.wrap { display: flex; gap: 14px; }
</style></head>
<body><div class="card">
  <div class="wrap">
  <nav class="nav">
    <div class="brand"><img src="../assets/asaulia-logo-full.png" style="height:20px;filter:invert(1) hue-rotate(180deg) brightness(1.2)"></div>
    <a class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</a>
    <a class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="7" rx="1"/></svg>Deliverables</a>
    <a class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>Sales</a>
    <a class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/></svg>Plan</a>
    <a class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 3 2V2l-3 2-3-2-3 2-3-2-3 2Z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg>Billing</a>
  </nav>
  <div style="flex:1; display:flex; align-items:center; justify-content:center; color: var(--fg-3); font-size: 13px; background: var(--bg-2); border-radius: 14px; box-shadow: var(--stroke-inner);">Content region</div>
  </div>
</div></body></html>
